# ADOT Collector sidecar config for Marshal processor (ECS Fargate).
#
# Receives OTLP on localhost from the app container, authenticates to
# Grafana Cloud via the basicauth extension using the instance_id (username)
# + api_token (password) pair stored in Secrets Manager as
# marshal/grafana-cloud/otlp-auth, and ships traces + metrics to Tempo + Mimir.
#
# Auth envs (GRAFANA_INSTANCE_ID, GRAFANA_API_TOKEN) are injected as secrets
# by the ECS task definition; the CDK stack wires them into this sidecar.

extensions:
  basicauth/grafana:
    client_auth:
      username: ${env:GRAFANA_INSTANCE_ID}
      password: ${env:GRAFANA_API_TOKEN}
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    # Tempo/Mimir ingest prefer modest batches; keep well under 5 MB.
    send_batch_size: 512
    send_batch_max_size: 1024
    timeout: 5s
  resource:
    attributes:
      - key: deployment.environment
        value: ${env:DEPLOYMENT_ENVIRONMENT}
        action: upsert
      - key: service.namespace
        value: marshal
        action: upsert
  memory_limiter:
    check_interval: 2s
    limit_percentage: 80
    spike_limit_percentage: 25

exporters:
  otlphttp/grafana:
    endpoint: https://otlp-gateway-prod-us-west-0.grafana.net/otlp
    auth:
      authenticator: basicauth/grafana
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

service:
  extensions: [basicauth/grafana, health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/grafana]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/grafana]
  telemetry:
    logs:
      level: info
