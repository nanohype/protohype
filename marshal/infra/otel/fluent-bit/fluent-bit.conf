[SERVICE]
    Flush        1
    Grace        5
    Log_Level    info
    Parsers_File parsers.conf

# FireLens in Fargate auto-wires a forward input; declaring it explicitly so the
# image works the same in non-firelens contexts (e.g. local smoke tests).
[INPUT]
    Name         forward
    Listen       127.0.0.1
    Port         24224

# Parse the "log" field (raw stdout line) as JSON so we can label by level /
# incident_id. Reserve_Data keeps the original firelens metadata (container_id,
# ecs_task_arn, etc.) on the record for Loki to pick up as labels.
[FILTER]
    Name         parser
    Match        *
    Key_Name     log
    Parser       marshal_json
    Reserve_Data true

# Drop records we can't parse — typically Fluent Bit's own pre-init stderr.
[FILTER]
    Name         grep
    Match        *
    Regex        timestamp ^.+$

[OUTPUT]
    Name         loki
    Match        *
    host         ${LOKI_HOST}
    port         443
    tls          on
    tls.verify   on
    http_user    ${LOKI_USERNAME}
    http_passwd  ${LOKI_API_TOKEN}
    # Static per-stream labels. Loki charges by label cardinality; anything that
    # could explode (trace_id, user IDs) stays in the log body, NOT as a label.
    labels       service=marshal-processor,environment=prod,source=ecs
    # Per-record labels lifted from the JSON parse above. $level + $incident_id
    # are bounded-cardinality and useful for ops filtering.
    label_keys   $level,$incident_id
    line_format  json
    auto_kubernetes_labels off
    remove_keys  container_id,container_name,ecs_cluster,ecs_task_arn,ecs_task_definition,source
