# Grafana Cloud Mimir alerting rules for Marshal.
#
# Upload via the Mimir ruler API (the CDK grafana-provisioner construct handles this
# automatically; or operators can upload manually via `mimirtool rules sync`).
# PromQL queries target OTel metric names as they arrive in Mimir.

namespace: marshal
groups:
  - name: marshal.slo
    interval: 1m
    rules:
      - alert: MarshalAssemblyDurationBreach
        expr: histogram_quantile(0.99, sum by (le) (rate(assembly_duration_ms_bucket[5m]))) > 300000
        for: 10m
        labels:
          severity: page
          service: marshal
          slo: assembly-under-5min
        annotations:
          summary: Marshal P99 war-room assembly exceeds 5-minute SLO
          description: |
            P99 assembly duration over the last 5 minutes is {{ $value | printf "%.0f" }} ms (>300000 ms).
            Runbook: artifacts/runbook.md § "SLO breach — assembly latency"

      - alert: MarshalDirectoryLookupFailureSpike
        expr: sum(rate(directory_lookup_failure_count_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warn
          service: marshal
        annotations:
          summary: Marshal directory lookup failures spiking
          description: |
            Directory (WorkOS) lookup failures exceed 0.1/s over the last 5 minutes.
            Incidents will assemble with empty responder lists until resolved.
            Runbook: artifacts/runbook.md § "Directory lookup degraded"

      - alert: MarshalStatuspagePublishFailures
        expr: sum(rate(statuspage_publish_count_total{outcome="failed"}[5m])) > 0
        for: 2m
        labels:
          severity: page
          service: marshal
        annotations:
          summary: Marshal failed to publish Statuspage.io updates
          description: |
            Statuspage.io publish failures in the last 5 minutes.
            IC approvals are stuck; customer communications not going out.
            Runbook: artifacts/runbook.md § "Statuspage.io publish failures"
