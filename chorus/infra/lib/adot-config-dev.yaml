# Local-dev collector config used by `make otel-local`. Accepts OTLP
# on localhost:4317 (gRPC) and :4318 (HTTP), logs everything to
# stdout via the debug exporter. No network egress — dev does not
# push to Grafana Cloud.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 1s

exporters:
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
