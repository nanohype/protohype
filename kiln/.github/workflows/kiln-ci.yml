name: kiln — CI

on:
  pull_request:
    paths:
      - 'kiln/**'
      - '.github/workflows/kiln-ci.yml'
  push:
    branches:
      - feat/kiln

defaults:
  run:
    working-directory: kiln/packages/core

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: kiln/packages/core/package-lock.json
      - run: npm ci
      - run: npm run build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: kiln/packages/core/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: kiln/packages/core/package-lock.json
      - run: npm ci
      - run: npm test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kiln-coverage
          path: kiln/packages/core/coverage/

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: kiln/packages/core/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run docs --if-present
