# fly.toml — cost-dash deployment
# Deploy: fly deploy --app cost-dash

app = "cost-dash"
primary_region = "iad"

[build]
  # Uses Dockerfile in this directory

[env]
  NODE_ENV = "production"
  PORT = "3000"
  # PERF_FILE set to volume mount path

[mounts]
  # Persistent volume for .perf.json
  source = "cost_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 3000

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "get"
    path = "/api/summary"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
