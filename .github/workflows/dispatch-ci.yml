name: dispatch-ci

on:
  push:
    branches: [main]
    paths:
      - 'dispatch/**'
      - '.github/workflows/dispatch-ci.yml'
  pull_request:
    paths:
      - 'dispatch/**'
      - '.github/workflows/dispatch-ci.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dispatch
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: dispatch/package-lock.json

      - name: Install
        # `npm install` instead of `npm ci`: the lockfile is generated on
        # macOS and omits Linux platform-specific optional deps that
        # vitest/rolldown pull in. `npm install` resolves them on the Linux
        # runner; version pinning comes from the lockfile regardless.
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Audit (production deps, high+ severity)
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (emit dist)
        run: npm run build

      - name: Install CDK deps (infra workspace)
        run: cd infra && npm install --prefer-offline --no-audit --no-fund

      - name: CDK synth (staging, env-agnostic)
        run: npx cdk synth DispatchStaging
        working-directory: dispatch/infra

      - name: Install web workspace
        # Same reason as the dispatch install step: the lockfile lacks
        # Linux platform-conditional binaries (rolldown, lightningcss,
        # esbuild) that Next.js 16 pulls in on Linux runners.
        run: npm install --prefer-offline --no-audit --no-fund
        working-directory: dispatch/web

      - name: Web typecheck
        run: npx tsc --noEmit
        working-directory: dispatch/web

      - name: Web build (Next.js standalone)
        run: npm run build
        working-directory: dispatch/web
        env:
          WORKOS_API_KEY: ci-placeholder
          WORKOS_CLIENT_ID: ci-placeholder
          WORKOS_COOKIE_PASSWORD: ci-placeholder-32-char-string-pad!
          WORKOS_REDIRECT_URI: https://dispatch.internal/callback
          API_BASE_URL: https://api.dispatch.internal
          OTEL_SDK_DISABLED: 'true'
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
          OTEL_SERVICE_NAME: dispatch-web
