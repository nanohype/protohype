name: marshal-nightly-drill

# Canary drill against staging. Runs nightly and on-demand via workflow_dispatch.
# Exercises the full P1 path (Lambda → SQS → processor → Slack → DDB) without
# invoking customer-visible steps (Statuspage publish, Linear create, channel
# announce, nudge firing). Failures mean the assembler or its dependencies
# regressed since the last deploy.
#
# Prerequisites on the AWS side:
#   - GH OIDC trust set up on a scoped IAM role (see docs/forking-for-a-new-client.md)
#   - Role has: secretsmanager:GetSecretValue on marshal/staging/slack/bot-token
#     + marshal/staging/grafana/oncall-webhook-hmac, cloudformation:DescribeStacks
#     on MarshalStaging, dynamodb:Get/Query/DeleteItem on marshal-staging-*
#
# To enable, set repository secret `AWS_DRILL_ROLE_ARN` to the role ARN.

on:
  schedule:
    # 09:00 UTC = 02:00 PT / 05:00 ET. Quiet window for most teams.
    - cron: '0 9 * * *'
  workflow_dispatch: {}

# One drill at a time. Queued runs drop.
concurrency:
  group: marshal-staging-drill
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  drill:
    name: Staging Drill
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ vars.MARSHAL_DRILL_ENABLED == 'true' }}
    defaults:
      run:
        working-directory: marshal
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DRILL_ROLE_ARN }}
          aws-region: us-west-2

      - name: Install tooling
        run: |
          # fire-drill.sh needs jq + openssl + curl; all present on ubuntu-latest.
          jq --version
          openssl version
          curl --version | head -1

      - name: Run CI drill
        env:
          ENVIRONMENT: staging
          AWS_REGION: us-west-2
          POLL_SEC: '120'
        run: bash scripts/ci-drill.sh
